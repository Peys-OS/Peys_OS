[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
polkadotHub = "${POLKADOT_HUB_RPC_URL}"
polkadotHubTestnet = "${POLKADOT_HUB_TESTNET_RPC_URL}"
moonbase = "${MOONBASE_RPC_URL}"

[profile.default.fuzz]
runs = 256
