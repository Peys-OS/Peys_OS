[profile.default]
src = "contracts/src"
out = "contracts/out"
test = "contracts/test"
libs = ["lib"]
solc_version = "0.8.15"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
# Note: Use the RPC_URL in .env file, these are aliases
polkadotHub = "${POLKADOT_HUB_RPC_URL}"
polkadotHubTestnet = "${POLKADOT_HUB_TESTNET_RPC_URL}"
moonbase = "${MOONBASE_RPC_URL}"
celo = "${CELO_RPC_URL}"
base = "${BASE_RPC_URL}"

[profile.default.fuzz]
runs = 256
