name: Publish SDK Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string
      sdk:
        description: 'SDK to publish'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - javascript
          - python
          - go
  push:
    branches:
      - main
    paths:
      - 'sdks/**'

jobs:
  publish-javascript:
    runs-on: ubuntu-latest
    if: github.event.inputs.sdk == 'all' || github.event.inputs.sdk == 'javascript'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@peys-os'

      - name: Install dependencies
        working-directory: ./sdks/javascript
        run: npm ci

      - name: Build package
        working-directory: ./sdks/javascript
        run: npm run build

      - name: Version bump
        working-directory: ./sdks/javascript
        run: npm version ${{ github.event.inputs.version || '1.0.0' }} --no-git-tag-version

      - name: Publish JavaScript SDK
        working-directory: ./sdks/javascript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access public

  publish-python:
    runs-on: ubuntu-latest
    if: github.event.inputs.sdk == 'all' || github.event.inputs.sdk == 'python'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build Python package
        working-directory: ./sdks/python
        run: python -m build

      - name: Publish Python SDK to GitHub Packages
        working-directory: ./sdks/python
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install build twine
          python -m twine upload \
            --repository-url https://npm.pkg.github.com \
            --skip-existing \
            --password "$NODE_AUTH_TOKEN" \
            dist/*

  publish-go:
    runs-on: ubuntu-latest
    if: github.event.inputs.sdk == 'all' || github.event.inputs.sdk == 'go'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Tag Go module version
        working-directory: ./sdks/go
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ github.event.inputs.version || '1.0.0' }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Go module tagged: $VERSION"
