<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receive - Peys</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Receive</h1>
  </header>

  <main class="container">
    <div class="card text-center">
      <div style="padding: var(--space-xl);">
        <i data-lucide="wallet" style="width:64px;height:64px;color:var(--accent);"></i>
      </div>
      <p class="text-muted mb-md">Share your wallet address to receive USDC</p>
    </div>

    <div class="card">
      <label class="input-label">Your Wallet Address</label>
      <div class="flex items-center gap-sm">
        <input type="text" class="input font-mono" id="address" value="0x1234...5678" readonly>
        <button class="btn btn-secondary btn-icon" onclick="copyAddress()"><i data-lucide="copy"></i></button>
      </div>
    </div>

    <div class="card">
      <label class="input-label">Payment Link</label>
      <div class="flex items-center gap-sm">
        <input type="text" class="input" id="payment-link" value="peys.io/pay/demo" readonly>
        <button class="btn btn-secondary btn-icon" onclick="copyLink()"><i data-lucide="copy"></i></button>
      </div>
    </div>

    <button class="btn btn-primary" onclick="shareAddress()"><i data-lucide="share-2" style="width:18px;height:18px;margin-right:8px;"></i>Share via WhatsApp</button>

    <div class="section">
      <h3 class="section-title">Recent Deposits</h3>
      <div class="card" id="deposits-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    lucide.createIcons();
    
    const phone = getPhoneFromUrl();

    function copyAddress() {
      const addr = document.getElementById('address').value;
      navigator.clipboard.writeText(addr);
      alert('Address copied!');
    }

    function copyLink() {
      const link = document.getElementById('payment-link').value;
      navigator.clipboard.writeText(link);
      alert('Link copied!');
    }

    function shareAddress() {
      const addr = document.getElementById('address').value;
      const link = document.getElementById('payment-link').value;
      const text = `Send me USDC on Peys!\n\nWallet: ${addr}\nLink: ${link}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    async function loadDeposits() {
      const txs = await loadTransactions(phone, 5);
      const list = document.getElementById('deposits-list');
      
      const deposits = txs.filter(tx => tx.type === 'received');
      
      if (deposits.length === 0) {
        list.innerHTML = '<p class="text-muted text-center">No deposits yet</p>';
        return;
      }

      list.innerHTML = deposits.map(tx => `
        <div class="list-item">
          <div class="list-item-icon"><i data-lucide="arrow-down-left"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">${tx.sender || 'Unknown'}</div>
            <div class="list-item-subtitle">${new Date(tx.created_at).toLocaleDateString()}</div>
          </div>
          <div class="amount amount-positive">+$${parseFloat(tx.amount).toFixed(2)}</div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    loadDeposits();
  </script>
</body>
</html>
