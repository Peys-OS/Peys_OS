<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address Labels - Peys</title>
  <meta name="description" content="Create custom labels and tags for wallet addresses in Peys.">
  <meta name="theme-color" content="#25D366">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Address Labels - Peys">
  <meta property="og:description" content="Create custom labels for wallet addresses.">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
  <style>
    .label-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
    }
    .color-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .color-swatch.selected {
      border-color: var(--text);
    }
    .label-row {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: var(--space-sm);
    }
    .address-text {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-all;
    }
  </style>
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Address Labels</h1>
  </header>

  <main class="container">
    <div class="card mb-md">
      <h3 class="mb-md">Create Label</h3>
      <div class="input-group">
        <label class="input-label">Label Name</label>
        <input type="text" class="input" id="labelName" placeholder="e.g., Friends, Work, Family">
      </div>
      <div class="input-group">
        <label class="input-label">Color</label>
        <div class="color-picker" id="colorPicker">
          <div class="color-swatch selected" style="background:#25D366;" data-color="#25D366"></div>
          <div class="color-swatch" style="background:#3B82F6;" data-color="#3B82F6"></div>
          <div class="color-swatch" style="background:#EF4444;" data-color="#EF4444"></div>
          <div class="color-swatch" style="background:#F59E0B;" data-color="#F59E0B"></div>
          <div class="color-swatch" style="background:#8B5CF6;" data-color="#8B5CF6"></div>
          <div class="color-swatch" style="background:#EC4899;" data-color="#EC4899"></div>
          <div class="color-swatch" style="background:#6B7280;" data-color="#6B7280"></div>
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">Wallet Address</label>
        <input type="text" class="input font-mono" id="walletAddress" placeholder="0x...">
      </div>
      <button class="btn btn-primary" onclick="createLabel()">
        <i data-lucide="plus" style="width:18px;height:18px;margin-right:8px;"></i>Create Label
      </button>
    </div>

    <div class="flex gap-sm mb-md" style="overflow-x:auto;">
      <button class="tab active" onclick="filterLabels('all')">All</button>
      <button class="tab" onclick="filterLabels('friends')">
        <span class="label-chip" style="background:rgba(37,211,102,0.2);color:#25D366;">Friends</span>
      </button>
      <button class="tab" onclick="filterLabels('work')">
        <span class="label-chip" style="background:rgba(59,130,246,0.2);color:#3B82F6;">Work</span>
      </button>
      <button class="tab" onclick="filterLabels('family')">
        <span class="label-chip" style="background:rgba(236,72,153,0.2);color:#EC4899;">Family</span>
      </button>
    </div>

    <div id="labelsList">
      <div class="label-row">
        <span class="label-chip" style="background:rgba(37,211,102,0.2);color:#25D366;">
          <i data-lucide="user" style="width:12px;height:12px;"></i> Friends
        </span>
        <div>
          <div style="font-weight:500;">Alice Johnson</div>
          <div class="address-text">0x7a3B...9f2E</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;">
          <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
        </button>
      </div>

      <div class="label-row">
        <span class="label-chip" style="background:rgba(37,211,102,0.2);color:#25D366;">
          <i data-lucide="user" style="width:12px;height:12px;"></i> Friends
        </span>
        <div>
          <div style="font-weight:500;">Bob Smith</div>
          <div class="address-text">0x1d4F...3aB9</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;">
          <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
        </button>
      </div>

      <div class="label-row">
        <span class="label-chip" style="background:rgba(59,130,246,0.2);color:#3B82F6;">
          <i data-lucide="briefcase" style="width:12px;height:12px;"></i> Work
        </span>
        <div>
          <div style="font-weight:500;">Acme Corp</div>
          <div class="address-text">0x9c2D...1eF7</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;">
          <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
        </button>
      </div>

      <div class="label-row">
        <span class="label-chip" style="background:rgba(236,72,153,0.2);color:#EC4899;">
          <i data-lucide="heart" style="width:12px;height:12px;"></i> Family
        </span>
        <div>
          <div style="font-weight:500;">Mom</div>
          <div class="address-text">0x5e3A...8bC2</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;">
          <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
        </button>
      </div>

      <div class="label-row">
        <span class="label-chip" style="background:rgba(245,158,11,0.2);color:#F59E0B;">
          <i data-lucide="star" style="width:12px;height:12px;"></i> VIP
        </span>
        <div>
          <div style="font-weight:500;">Big Client</div>
          <div class="address-text">0xf4dE...2cB8</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;">
          <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
        </button>
      </div>
    </div>
  </main>

  <script>
    let selectedColor = '#25D366';
    
    document.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
        swatch.classList.add('selected');
        selectedColor = swatch.dataset.color;
      });
    });

    function createLabel() {
      const name = document.getElementById('labelName').value.trim();
      const address = document.getElementById('walletAddress').value.trim();
      if (!name || !address) {
        alert('Please fill in all fields');
        return;
      }
      alert(`Label "${name}" created for ${address}`);
      document.getElementById('labelName').value = '';
      document.getElementById('walletAddress').value = '';
    }

    function filterLabels(filter) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
