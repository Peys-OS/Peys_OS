<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan QR Code - Peys</title>
  <meta name="description" content="Scan a QR code to send or receive USDC on Peys.">
  <meta name="theme-color" content="#25D366">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Scan QR Code - Peys">
  <meta property="og:description" content="Scan a QR code to send or receive USDC.">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Scan</h1>
  </header>

  <main class="container">
    <div class="card text-center">
      <div style="background:var(--bg-secondary);border-radius:var(--radius);padding:var(--space-xl);margin-bottom:var(--space-md);">
        <i data-lucide="scan" style="width:80px;height:80px;opacity:0.3;"></i>
      </div>
      <p class="text-muted">Point camera at QR code</p>
    </div>

    <div class="card">
      <label class="input-label">Or enter address manually</label>
      <input type="text" class="input font-mono" id="address" placeholder="0x...">
    </div>

    <button class="btn btn-primary" onclick="proceedToSend()"><i data-lucide="arrow-right" style="width:18px;height:18px;margin-right:8px;"></i>Continue</button>

    <div class="divider"></div>

    <div class="section">
      <h3 class="section-title">My Codes</h3>
      <div class="card">
        <a href="receive.html" class="list-item">
          <div class="list-item-icon"><i data-lucide="qr-code"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">My Receive Address</div>
            <div class="list-item-subtitle">Show to receive funds</div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </a>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    lucide.createIcons();
    
    function proceedToSend() {
      const address = document.getElementById('address').value.trim();
      if (address) {
        window.location.href = `send.html?to=${encodeURIComponent(address)}`;
      }
    }
  </script>
</body>
</html>
