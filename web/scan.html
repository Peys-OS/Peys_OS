<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan - Peys</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon">←</a>
    <h1>Scan</h1>
  </header>

  <main class="container">
    <div class="card text-center">
      <div style="background: var(--bg-secondary); border-radius: var(--radius); padding: var(--space-xl); margin-bottom: var(--space-md);">
        <div style="font-size: 8rem; opacity: 0.3;">📷</div>
      </div>
      <p class="text-muted">Point camera at QR code</p>
    </div>

    <div class="card">
      <label class="input-label">Or enter address manually</label>
      <input type="text" class="input font-mono" id="address" placeholder="0x...">
    </div>

    <button class="btn btn-primary" onclick="proceedToSend()">Continue</button>

    <div class="divider"></div>

    <div class="section">
      <h3 class="section-title">My Codes</h3>
      <div class="card" id="my-codes">
        <a href="receive.html" class="list-item">
          <div class="list-item-icon">📥</div>
          <div class="list-item-content">
            <div class="list-item-title">My Receive Address</div>
            <div class="list-item-subtitle">Show to receive funds</div>
          </div>
          <span>→</span>
        </a>
      </div>
    </div>
  </main>

  <script>
    function proceedToSend() {
      const address = document.getElementById('address').value.trim();
      if (address) {
        window.location.href = `send.html?to=${encodeURIComponent(address)}`;
      }
    }
  </script>
</body>
</html>
