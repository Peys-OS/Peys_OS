<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faucet - Peys</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon">←</a>
    <h1>Faucet</h1>
  </header>

  <main class="container">
    <div class="card text-center">
      <div style="font-size: 4rem; margin-bottom: var(--space-md);">🚰</div>
      <h2>Get Test ETH</h2>
      <p class="text-muted">Get free ETH on Base Sepolia testnet to pay for gas</p>
    </div>

    <div class="card">
      <div class="input-group">
        <label class="input-label">Wallet Address</label>
        <input type="text" class="input font-mono" id="wallet" placeholder="0x...">
      </div>
      <div id="faucet-result"></div>
      <button class="btn btn-primary" onclick="getFunds()">Get 0.1 ETH</button>
    </div>

    <div class="alert alert-warning">
      <strong>Testnet only</strong> - This faucet gives fake ETH for testing
    </div>
  </main>

  <script>
    async function getFunds() {
      const wallet = document.getElementById('wallet').value.trim();
      if (!wallet) {
        document.getElementById('faucet-result').innerHTML = '<div class="alert alert-danger">Enter wallet address</div>';
        return;
      }
      document.getElementById('faucet-result').innerHTML = '<div class="alert alert-warning">Requesting... (Demo)</div>';
      setTimeout(() => {
        document.getElementById('faucet-result').innerHTML = '<div class="alert alert-success">Sent 0.1 ETH!</div>';
      }, 1500);
    }
  </script>
</body>
</html>
