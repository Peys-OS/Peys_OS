<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Test ETH - Peys Faucet</title>
  <meta name="description" content="Get free test ETH on Base Sepolia to pay for gas fees when using Peys.">
  <meta name="theme-color" content="#25D366">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Get Test ETH - Peys Faucet">
  <meta property="og:description" content="Get free test ETH on Base Sepolia testnet.">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Faucet</h1>
  </header>

  <main class="container">
    <div class="card text-center">
      <div style="padding: var(--space-lg);">
        <i data-lucide="droplet" style="width:64px;height:64px;color:var(--accent);"></i>
      </div>
      <h2>Get Test ETH</h2>
      <p class="text-muted">Get free ETH on Base Sepolia testnet to pay for gas</p>
    </div>

    <div class="card">
      <div class="input-group">
        <label class="input-label">Wallet Address</label>
        <input type="text" class="input font-mono" id="wallet" placeholder="0x...">
      </div>
      <div id="faucet-result"></div>
      <button class="btn btn-primary" onclick="getFunds()"><i data-lucide="zap" style="width:18px;height:18px;margin-right:8px;"></i>Get 0.1 ETH</button>
    </div>

    <div class="alert alert-warning">
      <i data-lucide="alert-triangle" style="width:16px;height:16px;margin-right:8px;vertical-align:middle;"></i>
      <strong>Testnet only</strong> - This faucet gives fake ETH for testing
    </div>
  </main>

  <script src="api.js"></script>
  <script src="notifications.js"></script>
  <script>
    lucide.createIcons();
    
    async function getFunds() {
      const wallet = document.getElementById('wallet').value.trim();
      if (!wallet) {
        document.getElementById('faucet-result').innerHTML = '<div class="alert alert-danger">Enter wallet address</div>';
        return;
      }
      document.getElementById('faucet-result').innerHTML = '<div class="alert alert-warning">Requesting... (Demo)</div>';
      setTimeout(() => {
      document.getElementById('faucet-result').innerHTML = '<div class="alert alert-success">Sent 0.1 ETH!</div>';
      lucide.createIcons();
      const phone = getPhoneFromUrl();
      notifyFaucetSuccess(phone, '0.1', 'demo-tx-hash');
      }, 1500);
    }
  </script>
</body>
</html>
