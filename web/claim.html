<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Funds - Peys</title>
  <meta name="description" content="Claim your USDC funds sent via Peys on WhatsApp. Enter your claim code to receive.">
  <meta name="theme-color" content="#25D366">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Claim Funds - Peys">
  <meta property="og:description" content="Claim your USDC funds from Peys. Enter the claim code to receive.">
  <meta property="og:image" content="https://peys.io/images/og-claim.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Claim Funds - Peys">
  <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Claim</h1>
  </header>

  <main class="container">
    <div class="card text-center">
      <div style="padding: var(--space-lg);">
        <i data-lucide="gift" style="width:64px;height:64px;color:var(--accent);"></i>
      </div>
      <h2>Claim Your Funds</h2>
      <p class="text-muted">Enter the claim code sent to you</p>
    </div>

    <div class="card">
      <div class="input-group">
        <label class="input-label">Claim Code</label>
        <input type="text" class="input font-mono" id="claim-code" placeholder="Enter code">
      </div>

      <div id="claim-result"></div>

      <button class="btn btn-primary" onclick="claimFunds()"><i data-lucide="check-circle" style="width:18px;height:18px;margin-right:8px;"></i>Claim Funds</button>
    </div>

    <div class="section">
      <h3 class="section-title">Pending Claims</h3>
      <div class="card" id="pending-claims">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script src="notifications.js"></script>
  <script>
    lucide.createIcons();
    
    const phone = getPhoneFromUrl();

    async function loadPendingClaims() {
      try {
        const claims = await api.getPendingClaims(phone);
        const list = document.getElementById('pending-claims');
        
        if (!claims || claims.length === 0) {
          list.innerHTML = '<p class="text-muted text-center">No pending claims</p>';
          return;
        }

        list.innerHTML = claims.map(c => `
          <div class="list-item">
            <div class="list-item-icon"><i data-lucide="gift"></i></div>
            <div class="list-item-content">
              <div class="list-item-title">$${parseFloat(c.amount).toFixed(2)} USDC</div>
              <div class="list-item-subtitle">From: ${c.sender}</div>
            </div>
            <button class="btn btn-secondary" onclick="claimById('${c.id}')">Claim</button>
          </div>
        `).join('');
        lucide.createIcons();
      } catch (e) {
        document.getElementById('pending-claims').innerHTML = '<p class="text-muted text-center">Unable to load</p>';
      }
    }

    async function claimFunds() {
      const code = document.getElementById('claim-code').value.trim();
      if (!code) return;

      try {
        const claim = await api.claimFunds(code, phone);
        document.getElementById('claim-result').innerHTML = `
          <div class="alert alert-success">
            Claimed $${parseFloat(claim.amount).toFixed(2)} USDC!
          </div>
        `;
        document.getElementById('claim-code').value = '';
        
        // Send WhatsApp notification
        await notifyClaimSuccess(phone, parseFloat(claim.amount_usd || claim.amount / 1000000).toFixed(2), code);
        
        loadPendingClaims();
      } catch (e) {
        document.getElementById('claim-result').innerHTML = `
          <div class="alert alert-danger">${e.message}</div>
        `;
        await notifyClaimFailed(phone, e.message);
      }
    }

    async function claimById(id) {
      try {
        const claims = await api.getPendingClaims(phone);
        const claim = claims.find(c => c.id == id);
        if (claim) {
          await api.claimFunds(claim.code, phone);
          alert('Funds claimed!');
          loadPendingClaims();
        }
      } catch (e) {
        alert(e.message);
      }
    }

    loadPendingClaims();
  </script>
</body>
</html>
