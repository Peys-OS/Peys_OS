<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111B21">
    <meta name="description" content="Peys - Address Book">
    <meta property="og:title" content="Peys - Saved Addresses">
    <meta property="og:description" content="Manage your saved wallet addresses">
    <meta property="og:type" content="website">
    <title>Address Book - Peys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #111B21;
            --bg-secondary: #1F2C34;
            --bg-card: #222F37;
            --text-primary: #E9EDEF;
            --text-secondary: #8696A0;
            --accent: #00A884;
            --accent-light: #25D366;
            --danger: #F15C6D;
            --border: #374045;
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .add-btn {
            width: 44px;
            height: 44px;
            background: var(--accent-light);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-box {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }
        .search-box input::placeholder {
            color: var(--text-secondary);
        }
        .search-icon {
            color: var(--text-secondary);
            font-size: 18px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--accent-light);
            color: white;
        }
        .contact-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .contact-card:hover {
            background: var(--bg-card);
        }
        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }
        .contact-info {
            flex: 1;
        }
        .contact-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .contact-address {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }
        .contact-actions {
            display: flex;
            gap: 8px;
        }
        .action-icon {
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: none;
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-icon:hover {
            background: var(--border);
        }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 20px 0 12px;
            letter-spacing: 0.5px;
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .empty-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius);
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary {
            background: var(--accent-light);
            color: white;
        }
        @media (max-width: 480px) {
            body { padding: 16px; }
            .header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <h1>Address Book</h1>
        </div>
        <button class="add-btn" onclick="showAddModal()">+</button>
    </div>

    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search contacts or addresses..." id="searchInput">
    </div>

    <div class="tabs">
        <button class="tab active">All</button>
        <button class="tab">Frequent</button>
        <button class="tab">Groups</button>
    </div>

    <div class="section-title">Recent</div>

    <div class="contact-card" onclick="viewContact('alice')">
        <div class="contact-avatar">A</div>
        <div class="contact-info">
            <div class="contact-name">Alice Johnson</div>
            <div class="contact-address">0x7a3B...9f2E</div>
        </div>
        <div class="contact-actions">
            <button class="action-icon" onclick="event.stopPropagation(); sendTo('alice')">💸</button>
            <button class="action-icon" onclick="event.stopPropagation(); copyAddress('0x7a3B...9f2E')">📋</button>
        </div>
    </div>

    <div class="contact-card" onclick="viewContact('bob')">
        <div class="contact-avatar">B</div>
        <div class="contact-info">
            <div class="contact-name">Bob Smith</div>
            <div class="contact-address">0x1d4F...3aB9</div>
        </div>
        <div class="contact-actions">
            <button class="action-icon" onclick="event.stopPropagation(); sendTo('bob')">💸</button>
            <button class="action-icon" onclick="event.stopPropagation(); copyAddress('0x1d4F...3aB9')">📋</button>
        </div>
    </div>

    <div class="contact-card" onclick="viewContact('crypto')">
        <div class="contact-avatar">🏦</div>
        <div class="contact-info">
            <div class="contact-name">Crypto Exchange</div>
            <div class="contact-address">0x9c2D...1eF7</div>
        </div>
        <div class="contact-actions">
            <button class="action-icon" onclick="event.stopPropagation(); sendTo('crypto')">💸</button>
            <button class="action-icon" onclick="event.stopPropagation(); copyAddress('0x9c2D...1eF7')">📋</button>
        </div>
    </div>

    <div class="section-title">A</div>

    <div class="contact-card" onclick="viewContact('anna')">
        <div class="contact-avatar">A</div>
        <div class="contact-info">
            <div class="contact-name">Anna Williams</div>
            <div class="contact-address">0x2b8C...7dA4</div>
        </div>
        <div class="contact-actions">
            <button class="action-icon">💸</button>
            <button class="action-icon">📋</button>
        </div>
    </div>

    <div class="section-title">M</div>

    <div class="contact-card" onclick="viewContact('mike')">
        <div class="contact-avatar">M</div>
        <div class="contact-info">
            <div class="contact-name">Mike Chen</div>
            <div class="contact-address">0x5e3A...8bC2</div>
        </div>
        <div class="contact-actions">
            <button class="action-icon">💸</button>
            <button class="action-icon">📋</button>
        </div>
    </div>

    <div class="section-title">S</div>

    <div class="contact-card" onclick="viewContact('sarah')">
        <div class="contact-avatar">S</div>
        <div class="contact-info">
            <div class="contact-name">Sarah Davis</div>
            <div class="contact-address">0xf4dE...2cB8</div>
        </div>
        <div class="contact-actions">
            <button class="action-icon">💸</button>
            <button class="action-icon">📋</button>
        </div>
    </div>

    <div class="contact-card" onclick="viewContact('steve')">
        <div class="contact-avatar">S</div>
        <div class="contact-info">
            <div class="contact-name">Steve Park</div>
            <div class="contact-address">0xa8bC...1dE5</div>
        </div>
        <div class="contact-actions">
            <button class="action-icon">💸</button>
            <button class="action-icon">📋</button>
        </div>
    </div>

    <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">👤</div>
        <div class="empty-title">No contacts found</div>
        <p>Try a different search term</p>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.contact-card');
        const emptyState = document.getElementById('emptyState');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            let visibleCount = 0;

            cards.forEach(card => {
                const name = card.querySelector('.contact-name').textContent.toLowerCase();
                const address = card.querySelector('.contact-address').textContent.toLowerCase();
                const match = name.includes(query) || address.includes(query);
                card.style.display = match ? 'flex' : 'none';
                if (match) visibleCount++;
            });

            emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
        });

        function viewContact(id) {
            alert('Viewing contact: ' + id);
        }

        function sendTo(id) {
            window.location.href = 'send.html?to=' + id;
        }

        function copyAddress(address) {
            navigator.clipboard.writeText(address).then(() => {
                alert('Address copied!');
            });
        }

        function showAddModal() {
            alert('Add new contact');
        }
    </script>
</body>
</html>
