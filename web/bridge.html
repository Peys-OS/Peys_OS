<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111B21">
    <meta name="description" content="Peys - Bridge">
    <meta property="og:title" content="Peys - Bridge">
    <meta property="og:description" content="Bridge USDC across chains">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://peys.io/images/og-bridge.png">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
    <title>Bridge - Peys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #111B21;
            --bg-secondary: #1F2C34;
            --bg-card: #222F37;
            --text-primary: #E9EDEF;
            --text-secondary: #8696A0;
            --accent: #00A884;
            --accent-light: #25D366;
            --danger: #F15C6D;
            --border: #374045;
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .bridge-visual {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }
        .chain-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .chain-box {
            flex: 1;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .chain-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }
        .chain-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .chain-balance {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .bridge-arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .bridge-arrow-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .bridge-arrow-text {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .amount-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
        }
        .amount-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .amount-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .amount-input {
            flex: 1;
            background: var(--bg-card);
            border: none;
            border-radius: 8px;
            padding: 16px;
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 500;
        }
        .amount-input:focus {
            outline: none;
        }
        .max-btn {
            background: var(--accent-light);
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .amount-usd {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 12px;
        }
        .info-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-row span:first-child {
            color: var(--text-secondary);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary {
            background: var(--accent-light);
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .disclaimer {
            background: rgba(255, 193, 7, 0.1);
            border-radius: var(--radius);
            padding: 14px;
            margin-top: 24px;
            font-size: 12px;
            color: #ffc107;
            line-height: 1.5;
        }
        @media (max-width: 480px) {
            body { padding: 16px; }
            .header h1 { font-size: 20px; }
            .chain-icon { font-size: 32px; }
            .amount-input { font-size: 24px; }
        }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Bridge</h1>
    </div>

    <div class="bridge-visual">
        <div class="chain-row">
            <div class="chain-box">
                <div class="chain-icon"><i data-lucide="landmark" style="width:20px;height:20px;color:var(--accent-light);"></i></div>
                <div class="chain-name">Base</div>
                <div class="chain-balance">1,250 USDC</div>
            </div>
            <div class="bridge-arrow">
                <div class="bridge-arrow-icon">⇄</div>
                <div class="bridge-arrow-text">Bridge</div>
            </div>
            <div class="chain-box">
                <div class="chain-icon">🔷</div>
                <div class="chain-name">Ethereum</div>
                <div class="chain-balance">0 USDC</div>
            </div>
        </div>
    </div>

    <div class="amount-card">
        <div class="amount-label">Amount to bridge</div>
        <div class="amount-row">
            <input type="number" class="amount-input" value="100" id="bridgeAmount">
            <button class="max-btn" onclick="setMax()">MAX</button>
        </div>
        <div class="amount-usd">≈ $100.00 USD</div>
    </div>

    <div class="info-card">
        <div class="info-row">
            <span>Bridge Fee</span>
            <span>$1.00 (1%)</span>
        </div>
        <div class="info-row">
            <span>You will receive</span>
            <span>$99.00</span>
        </div>
        <div class="info-row">
            <span>Estimated time</span>
            <span>~5 minutes</span>
        </div>
        <div class="info-row">
            <span>Minimum</span>
            <span>10 USDC</span>
        </div>
    </div>

    <button class="btn btn-primary" onclick="startBridge()">Bridge 100 USDC</button>

    <div class="disclaimer">
        <i data-lucide="alert-triangle" style="width:16px;height:16px;vertical-align:middle;margin-right:8px;color:var(--warning);"></i> Bridging takes time. Assets will be available on Ethereum after ~5 minutes. Network congestion may affect transfer times.
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
