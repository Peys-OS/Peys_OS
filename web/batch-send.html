<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111B21">
    <meta name="description" content="Peys - Batch Send">
    <meta property="og:title" content="Peys - Batch Send">
    <meta property="og:description" content="Send to multiple recipients at once">
    <meta property="og:type" content="website">
    <title>Batch Send - Peys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #111B21;
            --bg-secondary: #1F2C34;
            --bg-card: #222F37;
            --text-primary: #E9EDEF;
            --text-secondary: #8696A0;
            --accent: #00A884;
            --accent-light: #25D366;
            --danger: #F15C6D;
            --border: #374045;
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .summary-bar {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .summary-item {
            text-align: center;
        }
        .summary-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-light);
        }
        .summary-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .recipient-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
        }
        .recipient-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .recipient-num {
            width: 28px;
            height: 28px;
            background: var(--accent-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }
        .recipient-input {
            flex: 1;
            background: var(--bg-card);
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .recipient-input::placeholder {
            color: var(--text-secondary);
        }
        .remove-btn {
            width: 28px;
            height: 28px;
            background: rgba(241, 92, 109, 0.2);
            border: none;
            border-radius: 50%;
            color: var(--danger);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .recipient-row {
            display: flex;
            gap: 8px;
        }
        .recipient-row input {
            flex: 2;
        }
        .recipient-row input:last-of-type {
            flex: 1;
        }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 24px 0 16px;
            letter-spacing: 0.5px;
        }
        .add-btn {
            width: 100%;
            padding: 14px;
            background: var(--bg-secondary);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            color: var(--accent-light);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            transition: background 0.2s;
        }
        .add-btn:hover {
            background: var(--bg-card);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary {
            background: var(--accent-light);
            color: white;
        }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .info-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 24px;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }
        .info-item .icon {
            font-size: 18px;
        }
        .info-item span {
            font-size: 13px;
            color: var(--text-secondary);
        }
        @media (max-width: 480px) {
            body { padding: 16px; }
            .header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Batch Send</h1>
    </div>

    <div class="summary-bar">
        <div class="summary-item">
            <div class="summary-value">3</div>
            <div class="summary-label">Recipients</div>
        </div>
        <div class="summary-item">
            <div class="summary-value">$175</div>
            <div class="summary-label">Total Amount</div>
        </div>
        <div class="summary-item">
            <div class="summary-value">$0.02</div>
            <div class="summary-label">Est. Gas</div>
        </div>
    </div>

    <div class="section-title">Recipients</div>

    <div id="recipientsList">
        <div class="recipient-card" id="recipient-1">
            <div class="recipient-header">
                <span class="recipient-num">1</span>
                <input type="text" class="recipient-input" placeholder="Wallet address or @username" value="alice.eth">
                <button class="remove-btn" onclick="removeRecipient(1)">×</button>
            </div>
            <div class="recipient-row">
                <input type="text" class="recipient-input" placeholder="Amount" value="50">
                <input type="text" class="recipient-input" placeholder="Note (optional)" value="Payment">
            </div>
        </div>

        <div class="recipient-card" id="recipient-2">
            <div class="recipient-header">
                <span class="recipient-num">2</span>
                <input type="text" class="recipient-input" placeholder="Wallet address or @username" value="bob.base">
                <button class="remove-btn" onclick="removeRecipient(2)">×</button>
            </div>
            <div class="recipient-row">
                <input type="text" class="recipient-input" placeholder="Amount" value="100">
                <input type="text" class="recipient-input" placeholder="Note (optional)" value="Invoice #123">
            </div>
        </div>

        <div class="recipient-card" id="recipient-3">
            <div class="recipient-header">
                <span class="recipient-num">3</span>
                <input type="text" class="recipient-input" placeholder="Wallet address or @username" value="0x7a3B...9f2E">
                <button class="remove-btn" onclick="removeRecipient(3)">×</button>
            </div>
            <div class="recipient-row">
                <input type="text" class="recipient-input" placeholder="Amount" value="25">
                <input type="text" class="recipient-input" placeholder="Note (optional)" value="Tip">
            </div>
        </div>
    </div>

    <button class="add-btn" onclick="addRecipient()">+ Add Recipient</button>

    <button class="btn btn-primary" onclick="sendBatch()">Send All ($175 USDC)</button>
    <button class="btn btn-secondary">Save as Draft</button>

    <div class="info-card">
        <div class="info-item">
            <span class="icon">⚠️</span>
            <span>All transactions will be sent in a single batch</span>
        </div>
        <div class="info-item">
            <span class="icon">⏱️</span>
            <span>Estimated time: ~30 seconds</span>
        </div>
        <div class="info-item">
            <span class="icon">💰</span>
            <span>Gas fees are split between recipients</span>
        </div>
    </div>

    <script>
        let recipientCount = 3;

        function addRecipient() {
            recipientCount++;
            const list = document.getElementById('recipientsList');
            const card = document.createElement('div');
            card.className = 'recipient-card';
            card.id = 'recipient-' + recipientCount;
            card.innerHTML = `
                <div class="recipient-header">
                    <span class="recipient-num">${recipientCount}</span>
                    <input type="text" class="recipient-input" placeholder="Wallet address or @username">
                    <button class="remove-btn" onclick="removeRecipient(${recipientCount})">×</button>
                </div>
                <div class="recipient-row">
                    <input type="text" class="recipient-input" placeholder="Amount">
                    <input type="text" class="recipient-input" placeholder="Note (optional)">
                </div>
            `;
            list.appendChild(card);
        }

        function removeRecipient(id) {
            const card = document.getElementById('recipient-' + id);
            if (document.querySelectorAll('.recipient-card').length > 1) {
                card.remove();
            }
        }

        function sendBatch() {
            alert('Sending batch transaction...');
        }
    </script>
</body>
</html>
