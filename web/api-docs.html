<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111B21">
    <meta name="description" content="Developer API documentation for integrating with Peys.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Developer API - Peys">
    <meta property="og:description" content="Developer API documentation for integrating with Peys.">
    <meta property="og:image" content="https://peys.io/images/og-api-docs.png">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
    <title>Developer API - Peys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #111B21;
            --bg-secondary: #1F2C34;
            --bg-card: #222F37;
            --text-primary: #E9EDEF;
            --text-secondary: #8696A0;
            --accent: #00A884;
            --accent-light: #25D366;
            --danger: #F15C6D;
            --border: #374045;
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .hero {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: var(--radius);
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
        }
        .hero-icon { font-size: 64px; margin-bottom: 16px; }
        .hero-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .hero-subtitle { font-size: 16px; opacity: 0.9; }
        .api-key-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }
        .api-key-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .api-key-row {
            display: flex;
            gap: 8px;
        }
        .api-key-input {
            flex: 1;
            background: var(--bg-card);
            border: none;
            border-radius: 8px;
            padding: 14px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 14px;
        }
        .copy-btn {
            background: var(--accent-light);
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .endpoint-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
        }
        .endpoint-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .method-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .method-badge.get { background: rgba(37, 211, 102, 0.2); color: var(--accent-light); }
        .method-badge.post { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .endpoint-path { font-family: monospace; font-size: 14px; }
        .endpoint-desc { font-size: 13px; color: var(--text-secondary); }
        .code-block {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 14px;
            font-family: monospace;
            font-size: 13px;
            overflow-x: auto;
            margin-top: 12px;
        }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 24px 0 16px;
            letter-spacing: 0.5px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn-primary { background: var(--accent-light); color: white; }
        @media (max-width: 480px) { body { padding: 16px; } }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Developer API</h1>
    </div>

    <div class="hero">
        <div class="hero-icon">🔌</div>
        <div class="hero-title">Build with Peys</div>
        <div class="hero-subtitle">Powerful APIs for developers</div>
    </div>

    <div class="api-key-card">
        <div class="api-key-label">Your API Key</div>
        <div class="api-key-row">
            <input type="text" class="api-key-input" value="pk_live_a1b2c3d4e5f6..." readonly>
            <button class="copy-btn">Copy</button>
        </div>
    </div>

    <div class="section-title">Quick Endpoints</div>

    <div class="endpoint-card">
        <div class="endpoint-header">
            <span class="method-badge get">GET</span>
            <span class="endpoint-path">/v1/balance</span>
        </div>
        <p class="endpoint-desc">Get account balance</p>
        <div class="code-block">{"balance": "1250.00", "currency": "USDC"}</div>
    </div>

    <div class="endpoint-card">
        <div class="endpoint-header">
            <span class="method-badge post">POST</span>
            <span class="endpoint-path">/v1/transfer</span>
        </div>
        <p class="endpoint-desc">Send USDC to an address</p>
        <div class="code-block">{"to": "0x...", "amount": "100"}</div>
    </div>

    <div class="endpoint-card">
        <div class="endpoint-header">
            <span class="method-badge get">GET</span>
            <span class="endpoint-path">/v1/transactions</span>
        </div>
        <p class="endpoint-desc">List recent transactions</p>
    </div>

    <button class="btn btn-primary">View Full Documentation</button>
</body>
</html>
