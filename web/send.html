<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send - Peys</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Send</h1>
  </header>

  <main class="container">
    <div class="card">
      <div class="input-group">
        <label class="input-label">Recipient</label>
        <input type="text" class="input" id="recipient" placeholder="Wallet address or @username">
      </div>

      <div class="input-group">
        <label class="input-label">Amount (USDC)</label>
        <input type="number" class="input" id="amount" placeholder="0.00" step="0.01">
      </div>

      <div class="input-group">
        <label class="input-label">Note (optional)</label>
        <input type="text" class="input" id="memo" placeholder="What's it for?">
      </div>
    </div>

    <div id="error-msg" class="alert alert-danger" style="display: none;"></div>
    <div id="success-msg" class="alert alert-success" style="display: none;"></div>

    <button class="btn btn-primary" onclick="sendFunds()"><i data-lucide="send" style="width:18px;height:18px;margin-right:8px;"></i>Send USDC</button>

    <div class="section">
      <h3 class="section-title">Quick Send</h3>
      <div class="card" id="contacts-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    lucide.createIcons();
    
    const phone = getPhoneFromUrl();

    async function loadContacts() {
      try {
        const contacts = await api.getContacts(phone);
        const list = document.getElementById('contacts-list');
        
        if (!contacts || contacts.length === 0) {
          list.innerHTML = '<p class="text-muted text-center">No contacts yet</p>';
          return;
        }

        list.innerHTML = contacts.map(c => `
          <div class="list-item" onclick="selectRecipient('${c.contact_phone}', '${c.name}')">
            <div class="avatar">${c.name.charAt(0).toUpperCase()}</div>
            <div class="list-item-content">
              <div class="list-item-title">${c.name}</div>
              <div class="list-item-subtitle">${c.contact_phone}</div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('contacts-list').innerHTML = '<p class="text-muted text-center">Unable to load contacts</p>';
      }
    }

    function selectRecipient(phone, name) {
      document.getElementById('recipient').value = name || phone;
    }

    async function sendFunds() {
      const recipient = document.getElementById('recipient').value.trim();
      const amount = document.getElementById('amount').value;
      const memo = document.getElementById('memo').value;

      if (!recipient || !amount) {
        document.getElementById('error-msg').textContent = 'Please fill in all required fields';
        document.getElementById('error-msg').style.display = 'block';
        return;
      }

      try {
        await api.createTransaction({
          sender: phone,
          recipient: recipient,
          amount: amount,
          type: 'send',
          memo: memo
        });

        document.getElementById('success-msg').textContent = `Sent $${amount} USDC successfully!`;
        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('error-msg').style.display = 'none';

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      } catch (error) {
        document.getElementById('error-msg').textContent = error.message || 'Failed to send';
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    loadContacts();
  </script>
</body>
</html>
