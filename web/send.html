<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Send USDC - Peys</title>
    <meta name="description" content="Send USDC to anyone via WhatsApp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --primary-light: #dcf8c6;
            --background: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e0e0e0;
            --success: #25D366;
            --error: #dc3545;
            --warning: #ffc107;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 32px 24px;
            text-align: center;
            border-radius: 0 0 24px 24px;
            margin-bottom: 24px;
        }
        .header h1 { color: white; font-size: 24px; margin-bottom: 8px; }
        .header p { color: rgba(255,255,255,0.9); font-size: 14px; }
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 24px;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .amount-input { position: relative; }
        .amount-input .currency { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 24px; font-weight: 600; color: var(--primary); }
        .amount-input input { padding-left: 48px; font-size: 32px; font-weight: 700; text-align: center; }
        .recipient-list { margin-top: 12px; }
        .recipient-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
        }
        .recipient-item:hover { background: var(--background); }
        .recipient-item.selected { background: var(--primary-light); }
        .recipient-avatar {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .recipient-info { flex: 1; }
        .recipient-name { font-weight: 600; color: var(--text-primary); }
        .recipient-phone { font-size: 13px; color: var(--text-muted); }
        .fee-display {
            background: var(--background);
            padding: 16px;
            border-radius: var(--radius-md);
            margin: 20px 0;
        }
        .fee-row { display: flex; justify-content: space-between; padding: 8px 0; }
        .fee-row.total { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 16px; font-weight: 600; font-size: 18px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
        .btn-secondary { background: var(--surface); color: var(--text-primary); border: 2px solid var(--border); }
        .btn-whatsapp { background: var(--primary); color: white; }
        .search-results { border: 1px solid var(--border); border-radius: var(--radius-md); margin-top: 8px; overflow: hidden; }
        .search-item { padding: 12px 16px; cursor: pointer; transition: var(--transition); }
        .search-item:hover { background: var(--background); }
        .search-item .name { font-weight: 500; }
        .search-item .phone { font-size: 13px; color: var(--text-muted); }
        .hidden { display: none !important; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .loading-overlay.active { opacity: 1; visibility: visible; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-screen { text-align: center; padding: 40px 24px; }
        .success-icon {
            width: 80px; height: 80px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 40px;
        }
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 1001; opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
        .modal h3 { font-size: 18px; margin-bottom: 16px; text-align: center; }
        .pin-input { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
        .pin-digit {
            width: 56px; height: 64px;
            text-align: center; font-size: 24px; font-weight: 600;
            border: 2px solid var(--border); border-radius: var(--radius-md);
        }
        .pin-digit:focus { border-color: var(--primary); outline: none; }
    </style>
</head>
<body>
    <header class="header">
        <h1>💸 Send USDC</h1>
        <p>Transfer funds instantly via WhatsApp</p>
    </header>
    <div class="container">
        <div id="send-form" class="card">
            <div class="form-group">
                <label class="form-label">Amount</label>
                <div class="amount-input">
                    <span class="currency">$</span>
                    <input type="number" id="amount" class="form-input" placeholder="0.00" min="1" step="0.01">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Recipient</label>
                <input type="text" id="recipient" class="form-input" placeholder="Phone number, @username, or name">
                <div id="searchResults" class="search-results hidden"></div>
                <div id="selectedRecipient" class="recipient-list hidden"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Note (optional)</label>
                <input type="text" id="note" class="form-input" placeholder="What's this for?">
            </div>
            <div class="fee-display">
                <div class="fee-row"><span>Amount</span><span id="displayAmount">$0.00</span></div>
                <div class="fee-row"><span>Fee (1.5%)</span><span id="displayFee">$0.00</span></div>
                <div class="fee-row total"><span>Total</span><span id="displayTotal">$0.00</span></div>
            </div>
            <button class="btn btn-primary" id="sendBtn" disabled>
                <span>🚀</span><span>Continue</span>
            </button>
            <div style="margin-top: 12px;">
                <a href="whatsapp://send?text=send" class="btn btn-whatsapp">
                    <span>📱</span><span>Send via WhatsApp</span>
                </a>
            </div>
        </div>
        <div id="success-screen" class="card hidden">
            <div class="success-screen">
                <div class="success-icon">✓</div>
                <h2 style="font-size: 24px; margin-bottom: 8px;">Transfer Initiated!</h2>
                <p style="color: var(--text-secondary); margin-bottom: 24px;">Your transaction is being processed</p>
                <div style="background: var(--background); padding: 16px; border-radius: var(--radius-md); margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span style="color: var(--text-muted);">Amount</span>
                        <span id="txAmount" style="font-weight: 600;">$0.00 USDC</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-muted);">To</span>
                        <span id="txRecipient" style="font-weight: 600;">-</span>
                    </div>
                </div>
                <a href="whatsapp://send?text=balance" class="btn btn-whatsapp">
                    <span>💬</span><span>Check Status on WhatsApp</span>
                </a>
            </div>
        </div>
    </div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" style="margin-top: 16px;">Processing transaction...</div>
    </div>
    <div class="modal" id="pinModal">
        <div class="modal-content">
            <h3>🔐 Enter your PIN</h3>
            <div class="pin-input">
                <input type="password" class="pin-digit" maxlength="1" data-index="0" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" data-index="1" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" data-index="2" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" data-index="3" inputmode="numeric">
            </div>
            <button class="btn btn-primary" id="confirmBtn" disabled>Confirm Transfer</button>
            <button class="btn btn-secondary" id="cancelBtn" style="margin-top: 12px;">Cancel</button>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const phoneNumber = urlParams.get('phone') || '';
        let selectedRecipient = null;
        let pinValue = '';
        const amountInput = document.getElementById('amount');
        const recipientInput = document.getElementById('recipient');
        const noteInput = document.getElementById('note');
        const sendBtn = document.getElementById('sendBtn');
        const searchResults = document.getElementById('searchResults');
        const selectedRecipientEl = document.getElementById('selectedRecipient');
        const pinModal = document.getElementById('pinModal');
        const pinDigits = document.querySelectorAll('.pin-digit');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        function updateFeeDisplay() {
            const amount = parseFloat(amountInput.value) || 0;
            const fee = amount * 0.015;
            const total = amount + fee;
            document.getElementById('displayAmount').textContent = `$${amount.toFixed(2)}`;
            document.getElementById('displayFee').textContent = `$${fee.toFixed(4)}`;
            document.getElementById('displayTotal').textContent = `$${total.toFixed(4)}`;
            validateForm();
        }
        function validateForm() {
            const amount = parseFloat(amountInput.value) || 0;
            sendBtn.disabled = amount < 1 || !selectedRecipient;
        }
        function selectRecipient(recipient) {
            selectedRecipient = recipient;
            recipientInput.value = recipient.phone || recipient.username || recipient.name;
            searchResults.classList.add('hidden');
            selectedRecipientEl.classList.remove('hidden');
            selectedRecipientEl.innerHTML = `
                <div class="recipient-item selected">
                    <div class="recipient-avatar">${(recipient.name || 'U')[0].toUpperCase()}</div>
                    <div class="recipient-info">
                        <div class="recipient-name">${recipient.name || 'Unknown'}</div>
                        <div class="recipient-phone">${recipient.phone || ''}</div>
                    </div>
                </div>
            `;
            validateForm();
        }
        let searchTimeout;
        recipientInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length < 2) {
                searchResults.classList.add('hidden');
                return;
            }
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/users/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    if (data.users && data.users.length > 0) {
                        searchResults.innerHTML = data.users.map(user => `
                            <div class="search-item" onclick="selectRecipient(${JSON.stringify(user).replace(/"/g, '&quot;')})">
                                <div class="name">${user.name || 'Unknown'}${user.username ? ` @${user.username}` : ''}</div>
                                <div class="phone">${user.phone || ''}</div>
                            </div>
                        `).join('');
                        searchResults.classList.remove('hidden');
                    } else {
                        searchResults.classList.add('hidden');
                    }
                } catch (error) {
                    console.error('Search error:', error);
                }
            }, 300);
        });
        amountInput.addEventListener('input', updateFeeDisplay);
        sendBtn.addEventListener('click', () => {
            if (parseFloat(amountInput.value) >= 1 && selectedRecipient) {
                pinModal.classList.add('active');
                pinDigits[0].focus();
            }
        });
        pinDigits.forEach((digit, index) => {
            digit.addEventListener('input', (e) => {
                const value = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = value;
                if (value && index < 3) pinDigits[index + 1].focus();
                pinValue = Array.from(pinDigits).map(d => d.value).join('');
                confirmBtn.disabled = pinValue.length !== 4;
            });
            digit.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    pinDigits[index - 1].focus();
                }
            });
        });
        cancelBtn.addEventListener('click', () => {
            pinModal.classList.remove('active');
            pinValue = '';
            pinDigits.forEach(d => d.value = '');
            confirmBtn.disabled = true;
        });
        confirmBtn.addEventListener('click', async () => {
            if (pinValue.length !== 4) return;
            loadingOverlay.classList.add('active');
            pinModal.classList.remove('active');
            try {
                const response = await fetch('/api/web/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phoneNumber,
                        amount: amountInput.value,
                        recipient: selectedRecipient.phone,
                        pin: pinValue,
                        note: noteInput.value
                    })
                });
                const result = await response.json();
                loadingOverlay.classList.remove('active');
                if (result.success) {
                    document.getElementById('send-form').classList.add('hidden');
                    document.getElementById('success-screen').classList.remove('hidden');
                    document.getElementById('txAmount').textContent = `$${parseFloat(amountInput.value).toFixed(2)} USDC`;
                    document.getElementById('txRecipient').textContent = selectedRecipient.name || selectedRecipient.phone;
                } else {
                    alert(result.message || 'Transaction failed');
                    pinValue = '';
                    pinDigits.forEach(d => d.value = '');
                    confirmBtn.disabled = true;
                }
            } catch (error) {
                loadingOverlay.classList.remove('active');
                alert('Network error. Please try again.');
            }
        });
    </script>
</body>
</html>
