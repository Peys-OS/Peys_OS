<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peys - USDC Payments on WhatsApp</title>
  <meta name="description" content="Send and receive USDC instantly on WhatsApp. Fast, secure, and simple crypto payments powered by Peys.">
  <meta name="theme-color" content="#25D366">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://peys.io/web/">
  <meta property="og:title" content="Peys - USDC Payments on WhatsApp">
  <meta property="og:description" content="Send and receive USDC instantly on WhatsApp. Fast, secure, and simple crypto payments.">
  <meta property="og:image" content="https://peys.io/images/og-default.png">
  <meta property="og:site_name" content="Peys">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://peys.io/web/">
  <meta name="twitter:title" content="Peys - USDC Payments on WhatsApp">
  <meta name="twitter:description" content="Send and receive USDC instantly on WhatsApp. Fast, secure, and simple crypto payments.">
  <meta name="twitter:image" content="https://peys.io/images/og-default.png">
  
  <!-- WhatsApp-specific -->
  <meta property="og:title" content="Peys 💸">
  <meta property="og:description" content="Send me USDC on WhatsApp - it's instant!">
  <meta property="og:image" content="https://peys.io/images/whatsapp-preview.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
</head>
<body class="grid-bg">
  <header class="header">
    <h1>Peys</h1>
  </header>

  <main class="container">
    <div class="balance card">
      <div class="balance-amount">
        $<span id="balance">0.00</span>
        <span class="balance-currency">USDC</span>
      </div>
      <p class="text-sm text-muted mt-md">Base Sepolia</p>
    </div>

    <div class="grid grid-4 mb-md">
      <a href="send.html" class="quick-action">
        <span class="quick-action-icon"><i data-lucide="send"></i></span>
        <span class="quick-action-label">Send</span>
      </a>
      <a href="receive.html" class="quick-action">
        <span class="quick-action-icon"><i data-lucide="download"></i></span>
        <span class="quick-action-label">Receive</span>
      </a>
      <a href="scan.html" class="quick-action">
        <span class="quick-action-icon"><i data-lucide="scan-line"></i></span>
        <span class="quick-action-label">Scan</span>
      </a>
      <a href="request.html" class="quick-action">
        <span class="quick-action-icon"><i data-lucide="file-text"></i></span>
        <span class="quick-action-label">Request</span>
      </a>
    </div>

    <div class="divider"></div>

    <div class="section">
      <h3 class="section-title">Recent Activity</h3>
      <div class="card" id="activity-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <i data-lucide="home"></i>
      <span>Home</span>
    </a>
    <a href="history.html" class="nav-item">
      <i data-lucide="clock"></i>
      <span>History</span>
    </a>
    <a href="send.html" class="nav-item">
      <i data-lucide="wallet"></i>
      <span>Send</span>
    </a>
    <a href="settings.html" class="nav-item">
      <i data-lucide="settings"></i>
      <span>Settings</span>
    </a>
  </nav>

  <style>
    .quick-action-icon i {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }
    .nav-item i {
      width: 24px;
      height: 24px;
    }
    .list-item-icon i {
      width: 20px;
      height: 20px;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: var(--space-sm) 0;
      padding-bottom: max(var(--space-sm), env(safe-area-inset-bottom));
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.625rem;
    }
    .nav-item i { color: var(--text-muted); }
    .nav-item.active { color: var(--accent); }
    .nav-item.active i { color: var(--accent); }
    body { padding-bottom: 70px; }
    .list-item-icon {
      width: 44px;
      height: 44px;
      background: var(--bg-secondary);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>

  <script src="api.js"></script>
  <script>
    lucide.createIcons();
    
    const phone = getPhoneFromUrl();

    async function init() {
      const balance = await loadBalance(phone);
      document.getElementById('balance').textContent = parseFloat(balance).toFixed(2);

      const txs = await loadTransactions(phone, 5);
      const list = document.getElementById('activity-list');
      
      if (!txs || txs.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i data-lucide="inbox"></i></div>
            <p>No transactions yet</p>
          </div>
        `;
        lucide.createIcons();
      } else {
        list.innerHTML = txs.map(tx => `
          <a href="transaction.html?id=${tx.id}" class="list-item">
            <div class="list-item-icon">
              <i data-lucide="${tx.type === 'sent' ? 'arrow-up-right' : 'arrow-down-left'}"></i>
            </div>
            <div class="list-item-content">
              <div class="list-item-title">${tx.type === 'sent' ? 'Sent to' : 'Received from'} ${tx.recipient || tx.sender || 'Unknown'}</div>
              <div class="list-item-subtitle">${new Date(tx.created_at).toLocaleDateString()}</div>
            </div>
            <div class="amount ${tx.type === 'sent' ? 'amount-negative' : 'amount-positive'}">
              ${tx.type === 'sent' ? '-' : '+'}$${parseFloat(tx.amount).toFixed(2)}
            </div>
          </a>
        `).join('');
        lucide.createIcons();
      }
    }

    init();
  </script>
</body>
</html>
