<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peys</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>Peys</h1>
  </header>

  <main class="container">
    <div class="balance card">
      <div class="balance-amount">
        $<span id="balance">0.00</span>
        <span class="balance-currency">USDC</span>
      </div>
      <p class="text-sm text-muted mt-md">Base Sepolia</p>
    </div>

    <div class="grid grid-4 mb-md">
      <a href="send.html" class="quick-action">
        <span class="quick-action-icon">📤</span>
        <span class="quick-action-label">Send</span>
      </a>
      <a href="receive.html" class="quick-action">
        <span class="quick-action-icon">📥</span>
        <span class="quick-action-label">Receive</span>
      </a>
      <a href="scan.html" class="quick-action">
        <span class="quick-action-icon">📷</span>
        <span class="quick-action-label">Scan</span>
      </a>
      <a href="request.html" class="quick-action">
        <span class="quick-action-icon">📋</span>
        <span class="quick-action-label">Request</span>
      </a>
    </div>

    <div class="divider"></div>

    <div class="section">
      <h3 class="section-title">Recent Activity</h3>
      <div class="card" id="activity-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <span>🏠</span>
      <span>Home</span>
    </a>
    <a href="history.html" class="nav-item">
      <span>📜</span>
      <span>History</span>
    </a>
    <a href="send.html" class="nav-item">
      <span>💸</span>
      <span>Send</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span>⚙️</span>
      <span>Settings</span>
    </a>
  </nav>

  <style>
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: var(--space-sm) 0;
      padding-bottom: max(var(--space-sm), env(safe-area-inset-bottom));
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.625rem;
    }
    .nav-item span:first-child { font-size: 1.25rem; }
    .nav-item.active { color: var(--accent); }
    body { padding-bottom: 70px; }
  </style>

  <script src="api.js"></script>
  <script>
    const phone = getPhoneFromUrl();

    async function init() {
      const balance = await loadBalance(phone);
      document.getElementById('balance').textContent = parseFloat(balance).toFixed(2);

      const txs = await loadTransactions(phone, 5);
      const list = document.getElementById('activity-list');
      
      if (!txs || txs.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📜</div>
            <p>No transactions yet</p>
          </div>
        `;
      } else {
        list.innerHTML = txs.map(tx => `
          <a href="transaction.html?id=${tx.id}" class="list-item">
            <div class="list-item-icon">${tx.type === 'sent' ? '📤' : '📥'}</div>
            <div class="list-item-content">
              <div class="list-item-title">${tx.type === 'sent' ? 'Sent to' : 'Received from'} ${tx.recipient || tx.sender || 'Unknown'}</div>
              <div class="list-item-subtitle">${new Date(tx.created_at).toLocaleDateString()}</div>
            </div>
            <div class="amount ${tx.type === 'sent' ? 'amount-negative' : 'amount-positive'}">
              ${tx.type === 'sent' ? '-' : '+'}$${parseFloat(tx.amount).toFixed(2)}
            </div>
          </a>
        `).join('');
      }
    }

    init();
  </script>
</body>
</html>
