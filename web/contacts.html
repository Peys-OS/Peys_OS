<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage your contacts in the Peys address book.">
    <meta name="theme-color" content="#25D366">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Contacts - Peys">
    <meta property="og:description" content="View and manage your contacts in the Peys address book.">
    <meta property="og:image" content="https://peys.io/images/og-contacts.png">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
    <title>Address Book - Peys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="grid-bg">
    <header class="header">
        <div class="header-top">
            <h1><i data-lucide="address-book" style="width:20px;height:20px;vertical-align:middle;margin-right:8px;"></i>Address Book</h1>
            <button class="btn-icon" id="addBtn" style="background:var(--accent);color:white;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;">
                <i data-lucide="plus" style="width:20px;height:20px;"></i>
            </button>
        </div>
        <div class="search-box">
            <i data-lucide="search" style="width:18px;height:18px;color:var(--text-muted);"></i>
            <input type="text" id="searchInput" placeholder="Search contacts...">
        </div>
    </header>
    <div class="content">
        <div class="section-title">Favorites</div>
        <div class="contact-list" id="favoritesList">
            <div class="empty-state" style="padding: 20px;">
                <p style="font-size: 13px;">No favorite contacts yet</p>
            </div>
        </div>
        <div class="section-title" style="margin-top: 24px;">All Contacts</div>
        <div class="contact-list" id="contactsList">
            <div class="loading" style="padding: 40px;">
                <p style="color: var(--text-muted);">Loading contacts...</p>
            </div>
        </div>
    </div>
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title">Add Contact</div>
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" id="contactName" class="form-input" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" id="contactPhone" class="form-input" placeholder="+1234567890">
            </div>
            <div class="form-group">
                <label class="form-label">Notes (optional)</label>
                <input type="text" id="contactNotes" class="form-input" placeholder="Friend, colleague...">
            </div>
            <button class="btn btn-primary" id="saveContact">Save Contact</button>
            <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const phoneNumber = urlParams.get('phone') || '';
        let contacts = [];
        async function loadContacts() {
            try {
                const response = await fetch(`/api/web/contacts?phone=${encodeURIComponent(phoneNumber)}`);
                const data = await response.json();
                contacts = data.contacts || [];
                renderContacts();
            } catch (error) {
                contacts = [];
                renderContacts();
            }
        }
        function renderContacts() {
            const favorites = contacts.filter(c => c.favorite);
            const others = contacts.filter(c => !c.favorite);
            const favList = document.getElementById('favoritesList');
            const list = document.getElementById('contactsList');
            if (favorites.length > 0) {
                favList.innerHTML = favorites.map(c => createContactHTML(c, true)).join('');
            } else {
                favList.innerHTML = '<div class="empty-state" style="padding: 20px;"><p style="font-size: 13px;">No favorites yet</p></div>';
            }
            if (others.length > 0) {
                list.innerHTML = others.map(c => createContactHTML(c)).join('');
            } else {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon"><i data-lucide="users" style="width:64px;height:64px;color:var(--text-muted);margin-bottom:16px;"></i></div><div>No contacts yet</div><div style="font-size:13px;margin-top:8px;">Add contacts to quickly send them money</div></div>';
            }
        }
        function createContactHTML(c, isFavorite = false) {
            const name = c.name || 'Unknown';
            const initial = name[0].toUpperCase();
            const id = c.id || c.phone;
            return `
                <div class="contact-item" onclick="selectContact('${id}')">
                    <div class="contact-avatar">${initial}</div>
                    <div class="contact-info">
                        <div class="contact-name">${name}${c.favorite ? ' <span class="fav-badge" style="background:#fff3cd;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">★</span>' : ''}</div>
                        <div class="contact-phone">${c.phone || ''}</div>
                    </div>
                    <div class="contact-actions">
                        <button class="action-btn" onclick="event.stopPropagation(); toggleFavorite('${id}')" style="color:#ffc107;">
                            <i data-lucide="star" style="width:18px;height:18px;"></i>
                        </button>
                        <button class="action-btn" onclick="event.stopPropagation(); sendTo('${id}')">
                            <i data-lucide="send" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                </div>
            `;
        }
        function selectContact(id) {
            window.location.href = `send.html?phone=${phoneNumber}&recipient=${id}`;
        }
        function sendTo(id) {
            window.location.href = `send.html?phone=${phoneNumber}&recipient=${id}`;
        }
        function toggleFavorite(id) {
            const contact = contacts.find(c => c.id === id || c.phone === id);
            if (contact) {
                contact.favorite = !contact.favorite;
                renderContacts();
            }
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        document.getElementById('addBtn').addEventListener('click', () => document.getElementById('addModal').classList.add('active'));
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = contacts.filter(c => 
                (c.name || '').toLowerCase().includes(query) || 
                (c.phone || '').includes(query)
            );
            const favList = document.getElementById('favoritesList');
            const list = document.getElementById('contactsList');
            if (query) {
                favList.innerHTML = filtered.filter(c => c.favorite).map(c => createContactHTML(c, true)).join('');
                list.innerHTML = filtered.filter(c => !c.favorite).map(c => createContactHTML(c)).join('');
            } else {
                renderContacts();
            }
        });
        document.getElementById('saveContact').addEventListener('click', async () => {
            const name = document.getElementById('contactName').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();
            const notes = document.getElementById('contactNotes').value.trim();
            if (!name || !phone) { alert('Name and phone are required'); return; }
            contacts.push({ id: Date.now(), name, phone, notes, favorite: false });
            renderContacts();
            closeModal('addModal');
            document.getElementById('contactName').value = '';
            document.getElementById('contactPhone').value = '';
            document.getElementById('contactNotes').value = '';
        });
        loadContacts();
        lucide.createIcons();
    </script>
</body>
</html>
