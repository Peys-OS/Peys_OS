<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111B21">
    <meta name="description" content="Peys - Edit Payment Link">
    <meta property="og:title" content="Peys - Edit Payment Link">
    <meta property="og:description" content="Edit your payment request link">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://peys.io/images/og-payment-link-edit.png">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
    <title>Edit Link - Peys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #111B21;
            --bg-secondary: #1F2C34;
            --bg-card: #222F37;
            --text-primary: #E9EDEF;
            --text-secondary: #8696A0;
            --accent: #00A884;
            --accent-light: #25D366;
            --danger: #F15C6D;
            --border: #374045;
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .link-preview {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }
        .link-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .link-url {
            font-size: 14px;
            font-family: monospace;
            color: var(--accent-light);
            background: var(--bg-card);
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            margin-bottom: 12px;
        }
        .link-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-light);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }
        .toggle-row:last-child {
            border-bottom: none;
        }
        .toggle-info h4 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        .toggle-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .toggle {
            width: 52px;
            height: 32px;
            background: var(--border);
            border-radius: 16px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle.active {
            background: var(--accent-light);
        }
        .toggle::after {
            content: '';
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        .toggle.active::after {
            transform: translateX(20px);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary {
            background: var(--accent-light);
            color: white;
        }
        .btn-danger {
            background: rgba(241, 92, 109, 0.2);
            color: var(--danger);
        }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        @media (max-width: 480px) {
            body { padding: 16px; }
            .header h1 { font-size: 20px; }
        }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="header">
        <a href="request.html" class="back-btn">←</a>
        <h1>Edit Link</h1>
    </div>

    <div class="link-preview">
        <div class="link-icon"><i data-lucide="dollar-sign" style="width:20px;height:20px;color:var(--accent-light);"></i></div>
        <div class="link-url">peys.io/pay/Moses123/invoice-001</div>
        <div class="link-stats">
            <span><i data-lucide="eye" style="width:14px;height:14px;vertical-align:middle;"></i> 24 views</span>
            <span><i data-lucide="check" style="width:14px;height:14px;vertical-align:middle;color:var(--accent-light);"></i> 3 paid</span>
            <span>$450 received</span>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
