<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111B21">
    <meta name="description" content="Peys - Statements">
    <meta property="og:title" content="Peys - Account Statement">
    <meta property="og:description" content="View your monthly account statement">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://peys.io/images/og-statement.png">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
    <title>Statement - Peys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #111B21;
            --bg-secondary: #1F2C34;
            --bg-card: #222F37;
            --text-primary: #E9EDEF;
            --text-secondary: #8696A0;
            --accent: #00A884;
            --accent-light: #25D366;
            --danger: #F15C6D;
            --border: #374045;
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .month-selector {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 24px;
        }
        .month-nav {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
        }
        .month-name {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }
        .summary-card {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }
        .summary-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .summary-value {
            font-size: 32px;
            font-weight: 700;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .summary-item {
            text-align: center;
        }
        .summary-item-label {
            font-size: 11px;
            opacity: 0.8;
        }
        .summary-item-value {
            font-size: 18px;
            font-weight: 600;
        }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 24px 0 16px;
            letter-spacing: 0.5px;
        }
        .tx-item {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .tx-icon {
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .tx-info {
            flex: 1;
        }
        .tx-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .tx-date {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .tx-amount {
            text-align: right;
        }
        .tx-amount-value {
            font-size: 16px;
            font-weight: 600;
        }
        .tx-amount-value.sent {
            color: var(--danger);
        }
        .tx-amount-value.received {
            color: var(--accent-light);
        }
        .tx-amount-usd {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary {
            background: var(--accent-light);
            color: white;
        }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        @media (max-width: 480px) {
            body { padding: 16px; }
            .header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <h1>Statement</h1>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
