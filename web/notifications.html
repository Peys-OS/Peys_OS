<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Peys</title>
    <meta name="description" content="View your Peys notifications and transaction alerts.">
    <meta name="theme-color" content="#25D366">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="styles.css">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Notifications - Peys">
    <meta property="og:description" content="View your Peys notifications.">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
</head>
<body class="grid-bg">
    <header class="header">
        <h1 style="display:flex;align-items:center;gap:8px;">
            <i data-lucide="bell" style="width:20px;height:20px;color:var(--accent);"></i> Notifications
        </h1>
        <button class="mark-read-btn" id="markAllBtn">Mark all read</button>
    </header>
    <div class="tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="tx">Transactions</button>
        <button class="tab" data-filter="claim">Claims</button>
        <button class="tab" data-filter="system">System</button>
    </div>
    <div class="content" id="notificationsList">
        <div class="loading">Loading notifications...</div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const phoneNumber = urlParams.get('phone') || '';
        let allNotifications = [];
        let currentFilter = 'all';
        async function loadNotifications() {
            const list = document.getElementById('notificationsList');
            list.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const response = await fetch(`/api/web/notifications?phone=${encodeURIComponent(phoneNumber)}`);
                const data = await response.json();
                allNotifications = data.notifications || [];
                renderNotifications();
            } catch (error) {
                allNotifications = [
                    { id: 1, type: 'tx', title: 'Payment Received', desc: 'You received $10.00 USDC from John', time: '2 min ago', read: false },
                    { id: 2, type: 'claim', title: 'Pending Claim', desc: 'You have $25.00 USDC to claim', time: '1 hour ago', read: false },
                    { id: 3, type: 'tx', title: 'Payment Sent', desc: 'You sent $5.00 USDC to Jane', time: '3 hours ago', read: true },
                    { id: 4, type: 'system', title: 'Welcome!', desc: 'Your Peys account is ready', time: '1 day ago', read: true }
                ];
                renderNotifications();
            }
        }
        function renderNotifications() {
            const list = document.getElementById('notificationsList');
            let filtered = allNotifications;
            if (currentFilter !== 'all') {
                filtered = allNotifications.filter(n => n.type === currentFilter);
            }
            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="empty-icon"><i data-lucide="bell-off" style="width:64px;height:64px;color:var(--text-muted);"></i></div><div>No notifications</div><div style="font-size:13px;margin-top:8px;">You're all caught up!</div></div>`;
                return;
            }
            list.innerHTML = filtered.map(n => {
                const iconClass = n.type === 'tx' ? 'tx' : n.type === 'claim' ? 'claim' : n.type === 'alert' ? 'alert' : 'system';
                const icon = n.type === 'tx' ? '<i data-lucide="send" style="width:20px;height:20px;color:var(--accent);"></i>' : n.type === 'claim' ? '<i data-lucide="gift" style="width:20px;height:20px;color:#f59e0b;"></i>' : n.type === 'alert' ? '<i data-lucide="alert-triangle" style="width:20px;height:20px;color:#ef4444;"></i>' : '<i data-lucide="info" style="width:20px;height:20px;color:#666;"></i>';
                const action = n.action ? `onclick="handleAction('${n.action}')"` : '';
                return `
                    <div class="notification-item ${n.read ? 'read' : 'unread'}" ${action}>
                        <div class="notif-header">
                            <div class="notif-icon ${iconClass}">${icon}</div>
                            <div class="notif-content">
                                <div class="notif-title">${n.title}</div>
                                <div class="notif-desc">${n.desc}</div>
                            </div>
                            <div>
                                <div class="notif-time">${n.time}</div>
                                <div class="notif-badge ${n.read ? 'hidden' : ''}"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        function handleAction(action) {
            if (action === 'balance') window.location.href = 'balance.html';
            else if (action === 'claim') window.location.href = 'claim.html';
            else if (action === 'history') window.location.href = 'history.html';
        }
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderNotifications();
            });
        });
        document.getElementById('markAllBtn').addEventListener('click', () => {
            allNotifications.forEach(n => n.read = true);
            renderNotifications();
        });
        loadNotifications();
        lucide.createIcons();
    </script>
</body>
</html>
