<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Peys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --primary-light: #dcf8c6;
            --background: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e0e0e0;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--background); min-height: 100vh; }
        .header {
            background: var(--surface);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .mark-read-btn { background: none; border: none; color: var(--primary); font-size: 14px; font-weight: 500; cursor: pointer; }
        .tabs { display: flex; gap: 4px; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab { padding: 8px 16px; background: none; border: none; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; }
        .content { padding: 20px; }
        .notification-item {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .notification-item:hover { transform: translateX(4px); }
        .notification-item.unread { border-left: 4px solid var(--primary); }
        .notification-item.read { opacity: 0.7; }
        .notif-header { display: flex; align-items: center; gap: 12px; padding: 16px; }
        .notif-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .notif-icon.tx { background: var(--primary-light); }
        .notif-icon.claim { background: #fff3cd; }
        .notif-icon.system { background: #e8e8e8; }
        .notif-icon.alert { background: #fce8e8; }
        .notif-content { flex: 1; }
        .notif-title { font-weight: 600; font-size: 15px; }
        .notif-desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .notif-time { font-size: 11px; color: var(--text-muted); text-align: right; }
        .notif-badge { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; margin-left: auto; }
        .notif-badge.hidden { visibility: hidden; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-muted); }
        .time-separator { text-align: center; padding: 16px; color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <header class="header">
        <h1>🔔 Notifications</h1>
        <button class="mark-read-btn" id="markAllBtn">Mark all read</button>
    </header>
    <div class="tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="tx">Transactions</button>
        <button class="tab" data-filter="claim">Claims</button>
        <button class="tab" data-filter="system">System</button>
    </div>
    <div class="content" id="notificationsList">
        <div class="loading">Loading notifications...</div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const phoneNumber = urlParams.get('phone') || '';
        let allNotifications = [];
        let currentFilter = 'all';
        async function loadNotifications() {
            const list = document.getElementById('notificationsList');
            list.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const response = await fetch(`/api/web/notifications?phone=${encodeURIComponent(phoneNumber)}`);
                const data = await response.json();
                allNotifications = data.notifications || [];
                renderNotifications();
            } catch (error) {
                allNotifications = [
                    { id: 1, type: 'tx', title: 'Payment Received', desc: 'You received $10.00 USDC from John', time: '2 min ago', read: false },
                    { id: 2, type: 'claim', title: 'Pending Claim', desc: 'You have $25.00 USDC to claim', time: '1 hour ago', read: false },
                    { id: 3, type: 'tx', title: 'Payment Sent', desc: 'You sent $5.00 USDC to Jane', time: '3 hours ago', read: true },
                    { id: 4, type: 'system', title: 'Welcome!', desc: 'Your Peys account is ready', time: '1 day ago', read: true }
                ];
                renderNotifications();
            }
        }
        function renderNotifications() {
            const list = document.getElementById('notificationsList');
            let filtered = allNotifications;
            if (currentFilter !== 'all') {
                filtered = allNotifications.filter(n => n.type === currentFilter);
            }
            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔔</div><div>No notifications</div><div style="font-size: 13px; margin-top: 8px;">You're all caught up!</div></div>`;
                return;
            }
            list.innerHTML = filtered.map(n => {
                const iconClass = n.type === 'tx' ? 'tx' : n.type === 'claim' ? 'claim' : n.type === 'alert' ? 'alert' : 'system';
                const icon = n.type === 'tx' ? '💸' : n.type === 'claim' ? '🎁' : n.type === 'alert' ? '⚠️' : 'ℹ️';
                const action = n.action ? `onclick="handleAction('${n.action}')"` : '';
                return `
                    <div class="notification-item ${n.read ? 'read' : 'unread'}" ${action}>
                        <div class="notif-header">
                            <div class="notif-icon ${iconClass}">${icon}</div>
                            <div class="notif-content">
                                <div class="notif-title">${n.title}</div>
                                <div class="notif-desc">${n.desc}</div>
                            </div>
                            <div>
                                <div class="notif-time">${n.time}</div>
                                <div class="notif-badge ${n.read ? 'hidden' : ''}"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        function handleAction(action) {
            if (action === 'balance') window.location.href = 'balance.html';
            else if (action === 'claim') window.location.href = 'claim.html';
            else if (action === 'history') window.location.href = 'history.html';
        }
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderNotifications();
            });
        });
        document.getElementById('markAllBtn').addEventListener('click', () => {
            allNotifications.forEach(n => n.read = true);
            renderNotifications();
        });
        loadNotifications();
    </script>
</body>
</html>
