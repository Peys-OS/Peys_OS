<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Peys</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>Create Account</h1>
  </header>

  <main class="container">
    <div class="text-center mb-md">
      <div style="font-size: 4rem; margin-bottom: var(--space-md);">💸</div>
      <p class="text-muted">Send and receive USDC via WhatsApp</p>
    </div>

    <div class="card">
      <div class="input-group">
        <label class="input-label">Phone Number</label>
        <input type="tel" class="input" id="phone" placeholder="+1234567890">
      </div>

      <div class="input-group">
        <label class="input-label">Name</label>
        <input type="text" class="input" id="name" placeholder="Your name">
      </div>

      <div class="input-group">
        <label class="input-label">PIN (4 digits)</label>
        <input type="password" class="input" id="pin" placeholder="••••" maxlength="4">
      </div>

      <div id="error-msg" class="alert alert-danger" style="display: none;"></div>
      <div id="success-msg" class="alert alert-success" style="display: none;"></div>
    </div>

    <button class="btn btn-primary" onclick="register()">Create Account</button>

    <p class="text-center text-sm text-muted mt-md">
      By creating an account, you agree to our Terms of Service
    </p>
  </main>

  <script src="api.js"></script>
  <script>
    async function register() {
      const phone = document.getElementById('phone').value.trim();
      const name = document.getElementById('name').value.trim();
      const pin = document.getElementById('pin').value.trim();

      if (!phone || !name || !pin || pin.length !== 4) {
        document.getElementById('error-msg').textContent = 'Please fill in all fields correctly';
        document.getElementById('error-msg').style.display = 'block';
        return;
      }

      try {
        await api.createUser({ phone, name, pin });
        await api.updateBalance(phone, '0.00');

        document.getElementById('success-msg').textContent = 'Account created successfully!';
        document.getElementById('success-msg').style.display = 'block';

        setTimeout(() => {
          window.location.href = `index.html?phone=${encodeURIComponent(phone)}`;
        }, 1500);
      } catch (error) {
        document.getElementById('error-msg').textContent = error.message || 'Registration failed';
        document.getElementById('error-msg').style.display = 'block';
      }
    }
  </script>
</body>
</html>
