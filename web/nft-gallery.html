<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111B21">
    <meta name="description" content="Peys - NFT Gallery">
    <meta property="og:title" content="Peys - NFT Gallery">
    <meta property="og:description" content="View your NFT collection">
    <meta property="og:type" content="website">
    <title>NFT Gallery - Peys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #111B21;
            --bg-secondary: #1F2C34;
            --bg-card: #222F37;
            --text-primary: #E9EDEF;
            --text-secondary: #8696A0;
            --accent: #00A884;
            --accent-light: #25D366;
            --danger: #F15C6D;
            --border: #374045;
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: var(--bg-secondary);
            border: none;
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab.active {
            background: var(--accent-light);
            color: white;
        }
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .nft-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .nft-card:hover {
            transform: translateY(-4px);
        }
        .nft-image {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }
        .nft-info {
            padding: 14px;
        }
        .nft-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .nft-collection {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .nft-price {
            font-size: 14px;
            color: var(--accent-light);
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 64px 24px;
        }
        .empty-icon {
            font-size: 80px;
            margin-bottom: 16px;
        }
        .empty-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .empty-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn {
            padding: 14px 32px;
            border-radius: var(--radius);
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary {
            background: var(--accent-light);
            color: white;
        }
        @media (max-width: 480px) {
            body { padding: 16px; }
            .header h1 { font-size: 20px; }
            .collection-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>NFT Gallery</h1>
    </div>

    <div class="tabs">
        <button class="tab active">All</button>
        <button class="tab">Collectibles</button>
        <button class="tab">Art</button>
    </div>

    <div class="collection-grid" id="nftGrid">
        <div class="nft-card" onclick="viewNft(1)">
            <div class="nft-image">🎨</div>
            <div class="nft-info">
                <div class="nft-name">Abstract #123</div>
                <div class="nft-collection">Digital Art Collection</div>
                <div class="nft-price">2.5 ETH</div>
            </div>
        </div>

        <div class="nft-card" onclick="viewNft(2)">
            <div class="nft-image" style="background: linear-gradient(135deg, #f093fb, #f5576c);">🐵</div>
            <div class="nft-info">
                <div class="nft-name">PeyPey #456</div>
                <div class="nft-collection">Peys Punks</div>
                <div class="nft-price">1.8 ETH</div>
            </div>
        </div>

        <div class="nft-card" onclick="viewNft(3)">
            <div class="nft-image" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">🏠</div>
            <div class="nft-info">
                <div class="nft-name">Virtual Land #12</div>
                <div class="nft-collection">MetaWorld</div>
                <div class="nft-price">5.0 ETH</div>
            </div>
        </div>

        <div class="nft-card" onclick="viewNft(4)">
            <div class="nft-image" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">🎮</div>
            <div class="nft-info">
                <div class="nft-name">Game Item #789</div>
                <div class="nft-collection">PlayToEarn</div>
                <div class="nft-price">0.5 ETH</div>
            </div>
        </div>
    </div>

    <script>
        function viewNft(id) {
            alert('Viewing NFT #' + id);
        }
    </script>
</body>
</html>
