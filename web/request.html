<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Payment - Peys</title>
  <meta name="description" content="Create a payment request link to receive USDC from anyone on WhatsApp.">
  <meta name="theme-color" content="#25D366">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Request Payment - Peys">
  <meta property="og:description" content="Create a payment link to receive USDC.">
  <meta property="og:image" content="https://peys.io/images/og-request.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Request</h1>
  </header>

  <main class="container">
    <div class="card text-center">
      <div style="padding: var(--space-lg);">
        <i data-lucide="file-text" style="width:64px;height:64px;color:var(--accent);"></i>
      </div>
      <h2>Create Payment Link</h2>
      <p class="text-muted">Share a link and anyone can pay you</p>
    </div>

    <div class="card">
      <div class="input-group">
        <label class="input-label">Amount (USDC)</label>
        <input type="number" class="input" id="amount" placeholder="0.00" step="0.01">
      </div>

      <div class="input-group">
        <label class="input-label">Description</label>
        <input type="text" class="input" id="memo" placeholder="What's this for?">
      </div>

      <div id="link-result"></div>
      <button class="btn btn-primary" onclick="createLink()"><i data-lucide="plus" style="width:18px;height:18px;margin-right:8px;"></i>Create Link</button>
    </div>

    <div class="section">
      <h3 class="section-title">Your Links</h3>
      <div class="card" id="links-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    lucide.createIcons();
    
    const phone = getPhoneFromUrl();

    async function loadLinks() {
      try {
        const links = await api.getPaymentLinks(phone);
        const list = document.getElementById('links-list');
        
        if (!links || links.length === 0) {
          list.innerHTML = '<p class="text-muted text-center">No payment links yet</p>';
          return;
        }

        list.innerHTML = links.map(l => `
          <div class="list-item">
            <div class="list-item-icon"><i data-lucide="link"></i></div>
            <div class="list-item-content">
              <div class="list-item-title">$${parseFloat(l.amount).toFixed(2)}</div>
              <div class="list-item-subtitle">${l.memo || 'Payment request'}</div>
            </div>
            <button class="btn btn-secondary btn-icon" onclick="copyLink('${l.slug}')"><i data-lucide="copy"></i></button>
          </div>
        `).join('');
        lucide.createIcons();
      } catch (e) {
        document.getElementById('links-list').innerHTML = '<p class="text-muted text-center">Unable to load</p>';
      }
    }

    async function createLink() {
      const amount = document.getElementById('amount').value;
      const memo = document.getElementById('memo').value;
      if (!amount) {
        document.getElementById('link-result').innerHTML = '<div class="alert alert-danger">Enter amount</div>';
        return;
      }

      try {
        const link = await api.createPaymentLink({ creator: phone, amount, memo });
        const url = `https://peys.io/pay/${link.slug}`;
        document.getElementById('link-result').innerHTML = `
          <div class="alert alert-success">
            <strong>Link created!</strong><br>
            <code>${url}</code>
          </div>
        `;
        lucide.createIcons();
        loadLinks();
      } catch (e) {
        document.getElementById('link-result').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
      }
    }

    function copyLink(slug) {
      navigator.clipboard.writeText(`https://peys.io/pay/${slug}`);
      alert('Link copied!');
    }

    loadLinks();
  </script>
</body>
</html>
