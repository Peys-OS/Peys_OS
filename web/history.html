<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History - Peys</title>
  <meta name="description" content="View your USDC transaction history on Peys. See all sent and received payments.">
  <meta name="theme-color" content="#25D366">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Transaction History - Peys">
  <meta property="og:description" content="View your USDC transaction history.">
  <meta property="og:image" content="https://peys.io/images/og-history.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>History</h1>
  </header>

  <main class="container">
    <div class="tabs mb-md">
      <button class="tab active" onclick="filterType('all')">All</button>
      <button class="tab" onclick="filterType('sent')">Sent</button>
      <button class="tab" onclick="filterType('received')">Received</button>
    </div>

    <div class="card" id="tx-list">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    lucide.createIcons();
    
    const phone = getPhoneFromUrl();
    let allTxs = [];

    async function loadHistory() {
      allTxs = await loadTransactions(phone, 50);
      renderTransactions(allTxs);
    }

    function filterType(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      if (type === 'all') {
        renderTransactions(allTxs);
      } else {
        renderTransactions(allTxs.filter(tx => tx.type === type));
      }
    }

    function renderTransactions(txs) {
      const list = document.getElementById('tx-list');
      
      if (txs.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <i data-lucide="inbox" style="width:48px;height:48px;opacity:0.3;"></i>
            <p>No transactions</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      list.innerHTML = txs.map(tx => `
        <a href="transaction.html?id=${tx.id}" class="list-item">
          <div class="list-item-icon">
            <i data-lucide="${tx.type === 'sent' ? 'arrow-up-right' : 'arrow-down-left'}"></i>
          </div>
          <div class="list-item-content">
            <div class="list-item-title">${tx.type === 'sent' ? 'Sent to' : 'Received from'}</div>
            <div class="list-item-subtitle">
              ${tx.recipient || tx.sender || 'Unknown'}
              <span class="badge ${tx.status === 'completed' ? 'badge-success' : 'badge-warning'}">${tx.status}</span>
            </div>
            <div class="list-item-subtitle">${new Date(tx.created_at).toLocaleString()}</div>
          </div>
          <div class="amount ${tx.type === 'sent' ? 'amount-negative' : 'amount-positive'}">
            ${tx.type === 'sent' ? '-' : '+'}$${parseFloat(tx.amount).toFixed(2)}
          </div>
        </a>
      `).join('');
      lucide.createIcons();
    }

    loadHistory();
  </script>
</body>
</html>
