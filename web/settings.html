<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Peys</title>
  <meta name="description" content="Manage your Peys account settings, security, and preferences.">
  <meta name="theme-color" content="#25D366">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Settings - Peys">
  <meta property="og:description" content="Manage your Peys account settings.">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/png" href="https://peys.io/favicon.png">
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Settings</h1>
  </header>

  <main class="container">
    <div class="section">
      <h3 class="section-title">Account</h3>
      <div class="card">
        <a href="profile.html" class="list-item">
          <div class="list-item-icon"><i data-lucide="user"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Profile</div>
            <div class="list-item-subtitle">Manage your profile</div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </a>
        <a href="security.html" class="list-item">
          <div class="list-item-icon"><i data-lucide="shield"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Security</div>
            <div class="list-item-subtitle">PIN, 2FA, sessions</div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </a>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">Preferences</h3>
      <div class="card">
        <div class="list-item">
          <div class="list-item-icon"><i data-lucide="bell"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Notifications</div>
          </div>
          <div class="toggle active" onclick="this.classList.toggle('active')"></div>
        </div>
        <div class="list-item">
          <div class="list-item-icon"><i data-lucide="moon"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Dark Mode</div>
          </div>
          <div class="toggle" onclick="this.classList.toggle('active')"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">Data</h3>
      <div class="card">
        <a href="export-data.html" class="list-item">
          <div class="list-item-icon"><i data-lucide="download"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Export Data</div>
            <div class="list-item-subtitle">Download your data</div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </a>
        <a href="referral.html" class="list-item">
          <div class="list-item-icon"><i data-lucide="gift"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Referrals</div>
            <div class="list-item-subtitle">Invite friends, earn rewards</div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </a>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">Support</h3>
      <div class="card">
        <a href="help.html" class="list-item">
          <div class="list-item-icon"><i data-lucide="help-circle"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Help & FAQ</div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </a>
        <a href="support.html" class="list-item">
          <div class="list-item-icon"><i data-lucide="message-circle"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Contact Support</div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </a>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">About</h3>
      <div class="card">
        <a href="network-status.html" class="list-item">
          <div class="list-item-icon"><i data-lucide="activity"></i></div>
          <div class="list-item-content">
            <div class="list-item-title">Network Status</div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </a>
        <div class="list-item" style="cursor: default;">
          <div class="list-item-content">
            <div class="list-item-title">Version</div>
            <div class="list-item-subtitle">1.0.0</div>
          </div>
        </div>
      </div>
    </div>

    <button class="btn btn-secondary" onclick="logout()"><i data-lucide="log-out" style="width:18px;height:18px;margin-right:8px;"></i>Log Out</button>
  </main>

  <script src="api.js"></script>
  <script>
    lucide.createIcons();
    
    function logout() {
      if (confirm('Are you sure you want to log out?')) {
        window.location.href = 'login.html';
      }
    }
  </script>
</body>
</html>
