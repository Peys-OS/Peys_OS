<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balance - Peys</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="grid-bg">
  <header class="header">
    <a href="index.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left"></i></a>
    <h1>Balance</h1>
  </header>

  <main class="container">
    <div class="balance card">
      <div class="text-muted text-sm">Total Balance</div>
      <div class="balance-amount">
        $<span id="balance">0.00</span>
        <span class="balance-currency">USDC</span>
      </div>
    </div>

    <div class="grid grid-2 mb-md">
      <div class="card text-center">
        <div class="text-muted text-sm">This Month</div>
        <div class="amount amount-positive" id="month-received">+$0.00</div>
      </div>
      <div class="card text-center">
        <div class="text-muted text-sm">This Month</div>
        <div class="amount amount-negative" id="month-sent">-$0.00</div>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">Tokens</h3>
      <div class="card">
        <div class="list-item">
          <div class="list-item-icon" style="background:#2775CA20;">
            <i data-lucide="circle" style="color:#2775CA;"></i>
          </div>
          <div class="list-item-content">
            <div class="list-item-title">USD Coin</div>
            <div class="list-item-subtitle">USDC</div>
          </div>
          <div class="text-right">
            <div id="usdc-balance">0.00</div>
            <div class="text-muted text-sm">~$<span id="usdc-usd">0.00</span></div>
          </div>
        </div>
      </div>
    </div>

    <a href="send.html" class="btn btn-primary"><i data-lucide="send" style="width:18px;height:18px;margin-right:8px;"></i>Send</a>
    <a href="receive.html" class="btn btn-secondary mt-md"><i data-lucide="download" style="width:18px;height:18px;margin-right:8px;"></i>Receive</a>
  </main>

  <script src="api.js"></script>
  <script>
    lucide.createIcons();
    
    const phone = getPhoneFromUrl();

    async function loadBalanceData() {
      const balance = await loadBalance(phone);
      document.getElementById('balance').textContent = parseFloat(balance).toFixed(2);
      document.getElementById('usdc-balance').textContent = parseFloat(balance).toFixed(2);
      document.getElementById('usdc-usd').textContent = parseFloat(balance).toFixed(2);

      const txs = await loadTransactions(phone, 100);
      const now = new Date();
      const monthTxs = txs.filter(tx => new Date(tx.created_at).getMonth() === now.getMonth());
      
      const received = monthTxs.filter(tx => tx.type === 'received').reduce((sum, tx) => sum + parseFloat(tx.amount), 0);
      const sent = monthTxs.filter(tx => tx.type === 'sent').reduce((sum, tx) => sum + parseFloat(tx.amount), 0);
      
      document.getElementById('month-received').textContent = `+$${received.toFixed(2)}`;
      document.getElementById('month-sent').textContent = `-$${sent.toFixed(2)}`;
    }

    loadBalanceData();
  </script>
</body>
</html>
