<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Peys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --primary-light: #dcf8c6;
            --background: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e0e0e0;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--background); min-height: 100vh; }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 48px 24px;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 20px; margin-bottom: 8px; }
        .header-sub { font-size: 14px; opacity: 0.9; }
        .container { padding: 20px; max-width: 480px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: 20px; margin-bottom: 20px; }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .stat-item { text-align: center; padding: 16px; background: var(--background); border-radius: var(--radius-md); }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .stat-value.sent { color: #dc3545; }
        .chart-container { height: 200px; background: var(--background); border-radius: var(--radius-md); padding: 16px; margin: 16px 0; display: flex; align-items: flex-end; gap: 8px; }
        .chart-bar { flex: 1; background: var(--primary); border-radius: 4px 4px 0 0; min-height: 10px; transition: height 0.3s; }
        .chart-bar.received { background: var(--primary); }
        .chart-bar.sent { background: #dc3545; }
        .period-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .period-tab { flex: 1; padding: 10px; background: var(--background); border: none; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .period-tab.active { background: var(--primary); color: white; }
        .top-contact { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .top-contact:last-child { border-bottom: none; }
        .rank { font-size: 20px; font-weight: 700; color: var(--text-muted); width: 30px; }
        .rank.gold { color: #ffd700; }
        .rank.silver { color: #c0c0c0; }
        .rank.bronze { color: #cd7f32; }
        .contact-info { flex: 1; }
        .contact-name { font-weight: 600; }
        .contact-count { font-size: 13px; color: var(--text-muted); }
        .contact-amount { font-weight: 700; color: var(--primary); }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px 24px; border: none; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; background: var(--background); color: var(--text-primary); border: 2px solid var(--border); }
        .btn:hover { border-color: var(--primary); }
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>
    <header class="header">
        <h1>📊 Analytics</h1>
        <div class="header-sub">Your spending insights</div>
    </header>
    <div class="container">
        <div class="card">
            <div class="period-tabs">
                <button class="period-tab active" data-period="week">Week</button>
                <button class="period-tab" data-period="month">Month</button>
                <button class="period-tab" data-period="year">Year</button>
            </div>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalSent">$0</div>
                    <div class="stat-label">Total Sent</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalReceived">$0</div>
                    <div class="stat-label">Total Received</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="txCount">0</div>
                    <div class="stat-label">Transactions</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avgTx">$0</div>
                    <div class="stat-label">Avg. Transaction</div>
                </div>
            </div>
        </div>
        <div class="card">
            <h3 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">TRANSACTION VOLUME</h3>
            <div class="chart-container" id="chartContainer">
                <div class="loading">Loading chart...</div>
            </div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 12px;">
                <span><span style="color: var(--primary);">■</span> Received</span>
                <span><span style="color: #dc3545;">■</span> Sent</span>
            </div>
        </div>
        <div class="card">
            <h3 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">TOP RECIPIENTS</h3>
            <div id="topRecipients">
                <div class="loading">Loading...</div>
            </div>
        </div>
        <button class="btn" id="exportBtn">
            <span>📥</span><span>Export as CSV</span>
        </button>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const phoneNumber = urlParams.get('phone') || '';
        let currentPeriod = 'week';
        async function loadAnalytics() {
            try {
                const response = await fetch(`/api/web/analytics?phone=${encodeURIComponent(phoneNumber)}&period=${currentPeriod}`);
                const data = await response.json();
                updateStats(data);
                updateChart(data.chartData);
                updateTopRecipients(data.topRecipients);
            } catch (error) {
                console.error('Error loading analytics:', error);
                updateStats({ totalSent: 0, totalReceived: 0, txCount: 0, avgTx: 0 });
                updateChart([]);
                updateTopRecipients([]);
            }
        }
        function updateStats(data) {
            document.getElementById('totalSent').textContent = '$' + (data.totalSent || 0).toFixed(0);
            document.getElementById('totalReceived').textContent = '$' + (data.totalReceived || 0).toFixed(0);
            document.getElementById('totalReceived').className = 'stat-value';
            document.getElementById('totalSent').className = 'stat-value sent';
            document.getElementById('txCount').textContent = data.txCount || 0;
            document.getElementById('avgTx').textContent = '$' + (data.avgTx || 0).toFixed(0);
        }
        function updateChart(chartData) {
            const container = document.getElementById('chartContainer');
            if (!chartData || chartData.length === 0) {
                container.innerHTML = '<div class="loading">No data available</div>';
                return;
            }
            const maxVal = Math.max(...chartData.map(d => Math.max(d.received || 0, d.sent || 0)));
            container.innerHTML = chartData.map(d => {
                const receivedHeight = maxVal ? ((d.received || 0) / maxVal * 100) : 0;
                const sentHeight = maxVal ? ((d.sent || 0) / maxVal * 100) : 0;
                return `
                    <div style="flex: 1; display: flex; flex-direction: column; gap: 4px; align-items: center;">
                        <div style="display: flex; gap: 2px; height: 150px; align-items: flex-end;">
                            <div class="chart-bar received" style="height: ${receivedHeight}%; width: 50%;"></div>
                            <div class="chart-bar sent" style="height: ${sentHeight}%; width: 50%;"></div>
                        </div>
                        <div style="font-size: 10px; color: var(--text-muted);">${d.label}</div>
                    </div>
                `;
            }).join('');
        }
        function updateTopRecipients(recipients) {
            const container = document.getElementById('topRecipients');
            if (!recipients || recipients.length === 0) {
                container.innerHTML = '<div class="loading">No data yet</div>';
                return;
            }
            container.innerHTML = recipients.slice(0, 5).map((r, i) => {
                const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                const rankSymbol = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;
                return `
                    <div class="top-contact">
                        <div class="rank ${rankClass}">${rankSymbol}</div>
                        <div class="contact-info">
                            <div class="contact-name">${r.name || 'Unknown'}</div>
                            <div class="contact-count">${r.count} transactions</div>
                        </div>
                        <div class="contact-amount">$${r.total.toFixed(0)}</div>
                    </div>
                `;
            }).join('');
        }
        document.querySelectorAll('.period-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentPeriod = tab.dataset.period;
                loadAnalytics();
            });
        });
        document.getElementById('exportBtn').addEventListener('click', async () => {
            try {
                const response = await fetch(`/api/web/analytics/export?phone=${encodeURIComponent(phoneNumber)}&period=${currentPeriod}`);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `peys-analytics-${currentPeriod}.csv`;
                a.click();
            } catch (error) {
                alert('Export failed. Please try again.');
            }
        });
        loadAnalytics();
    </script>
</body>
</html>
