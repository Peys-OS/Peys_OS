[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
polygonAmoy = "https://polygon-amoy.g.alchemy.com/v2/${POLYGON_AMOY_API_KEY}"
baseSepolia = "https://base-sepolia.g.alchemy.com/v2/${BASESCAN_API_KEY}"
celoAlfajores = "https://celo-sepolia.g.alchemy.com/v2/${CELO_ALCHEMY_KEY}"
polkadotHub = "https://eth-asset-hub-paseo.dotters.network"

[etherscan]
polygonAmoy = { key = "${POLYGONSCAN_API_KEY}" }
baseSepolia = { key = "${BASESCAN_API_KEY}" }
